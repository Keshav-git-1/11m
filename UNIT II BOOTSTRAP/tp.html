<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Change Background</title>
</head>

<body>
    <h1 id="myText">This is my text</h1>
    <button onclick="change_bg()">CHANGE BACKGROUND</button>

    <script>
        function change_bg() {
            document.body.style.backgroundColor = "black";
            document.body.style.color = "white";
        }
    </script>
</body>

</html>
